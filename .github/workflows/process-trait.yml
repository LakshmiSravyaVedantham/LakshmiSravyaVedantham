name: Process Bot Trait

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: startsWith(github.event.issue.title, 'trait:')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Process trait contribution
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/process_trait.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add game/state.json README.md
          git diff --staged --quiet || git commit -m "bot: add trait from issue #${{ github.event.issue.number }}"
          git push
