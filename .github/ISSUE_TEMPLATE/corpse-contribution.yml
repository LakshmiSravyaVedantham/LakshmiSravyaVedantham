name: "🧩 Exquisite Corpse Contribution"
description: "Add your lines to the collaborative blind-coding poem. You see only the last line — no peeking!"
title: "corpse: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🎭 Exquisite Corpse — Collaborative Blind Coding

        > Each player sees only the **last line** written before them.
        > The full program is hidden and revealed every **Sunday**.
        > No one knows what it becomes.

        ---

        ### ✍️ Your Prompt

        Continue from this exact line (visible in the README):

        > _Check the [README](https://github.com/LakshmiSravyaVedantham/LakshmiSravyaVedantham#-exquisite-corpse) for the current last line_

        **Rules:**
        - Write **3 or more lines** of Python
        - Continue naturally from the last line shown in the README
        - Do **not** look at `game/corpus.b64` or previous contributions
        - Any style is welcome — weird, abstract, functional, surreal

        ---

  - type: textarea
    id: code
    attributes:
      label: "Your contribution (Python)"
      description: "Write 3+ lines of Python continuing from the prompt. Wrap in a Python code block."
      placeholder: |
        ```python
        # your code here (3+ lines)
        ```
      value: |
        ```python

        ```
    validations:
      required: true

  - type: checkboxes
    id: honor
    attributes:
      label: "Honor system"
      description: "Please confirm before submitting."
      options:
        - label: "I have **NOT** looked at `game/corpus.b64`, the history folder, or old issues to see the hidden code."
          required: true
        - label: "My contribution has at least **3 lines** of Python."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        > ⚠️ **SPOILER WARNING** — `game/corpus.b64` contains the hidden accumulated code. **DO NOT OPEN IT** if you want to play fairly.

        _After you submit, a bot will process your contribution and post the next player's prompt as a comment. The issue will be closed automatically._
