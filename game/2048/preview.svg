<svg width="400" height="180" xmlns="http://www.w3.org/2000/svg">
  <!-- Card background -->
  <rect width="400" height="180" rx="10" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="399" height="179" rx="9.5" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Mini grid background -->
  <rect x="220" y="18" width="162" height="144" rx="8" fill="#161b22"/>

  <!-- Grid cells -->
  <rect x="228" y="26" width="32" height="32" rx="4" fill="#0d1117"/>
  <rect x="266" y="26" width="32" height="32" rx="4" fill="#192a3e"/>
  <rect x="304" y="26" width="32" height="32" rx="4" fill="#1a3660"/>
  <rect x="342" y="26" width="32" height="32" rx="4" fill="#0d1117"/>

  <rect x="228" y="64" width="32" height="32" rx="4" fill="#1a3660"/>
  <rect x="266" y="64" width="32" height="32" rx="4" fill="#1158a8"/>
  <rect x="304" y="64" width="32" height="32" rx="4" fill="#0d1117"/>
  <rect x="342" y="64" width="32" height="32" rx="4" fill="#1158a8"/>

  <rect x="228" y="102" width="32" height="32" rx="4" fill="#0d1117"/>
  <rect x="266" y="102" width="32" height="32" rx="4" fill="#0a7c3a"/>
  <rect x="304" y="102" width="32" height="32" rx="4" fill="#1a7f37"/>
  <rect x="342" y="102" width="32" height="32" rx="4" fill="#0d1117"/>

  <rect x="228" y="140" width="32" height="32" rx="4" fill="#9e6a03"/>
  <rect x="266" y="140" width="32" height="32" rx="4" fill="#c05b00"/>
  <rect x="304" y="140" width="32" height="32" rx="4" fill="#6e31b5"/>
  <rect x="342" y="140" width="32" height="32" rx="4" fill="#6e31b5"/>

  <!-- Tile numbers -->
  <text x="282" y="47" font-family="Arial,sans-serif" font-size="11" font-weight="800" fill="#79c0ff" text-anchor="middle">2</text>
  <text x="320" y="47" font-family="Arial,sans-serif" font-size="11" font-weight="800" fill="#a5c8ff" text-anchor="middle">4</text>
  <text x="244" y="85" font-family="Arial,sans-serif" font-size="11" font-weight="800" fill="#a5c8ff" text-anchor="middle">4</text>
  <text x="282" y="85" font-family="Arial,sans-serif" font-size="11" font-weight="800" fill="white" text-anchor="middle">8</text>
  <text x="358" y="85" font-family="Arial,sans-serif" font-size="11" font-weight="800" fill="white" text-anchor="middle">8</text>
  <text x="282" y="123" font-family="Arial,sans-serif" font-size="11" font-weight="800" fill="#56d364" text-anchor="middle">16</text>
  <text x="320" y="123" font-family="Arial,sans-serif" font-size="11" font-weight="800" fill="white" text-anchor="middle">32</text>
  <text x="244" y="161" font-family="Arial,sans-serif" font-size="10" font-weight="800" fill="#f5c842" text-anchor="middle">64</text>
  <text x="282" y="161" font-family="Arial,sans-serif" font-size="10" font-weight="800" fill="#ffa657" text-anchor="middle">256</text>
  <text x="320" y="158" font-family="Arial,sans-serif" font-size="8" font-weight="800" fill="#e2c5ff" text-anchor="middle">2048</text>
  <text x="358" y="158" font-family="Arial,sans-serif" font-size="8" font-weight="800" fill="#e2c5ff" text-anchor="middle">2048</text>

  <!-- 2048 glow on winning tile -->
  <rect x="304" y="140" width="32" height="32" rx="4" fill="none" stroke="#bc8cff" stroke-width="1.5" opacity="0.7"/>

  <!-- Left side: title + description -->
  <text x="20" y="55" font-family="Arial Black,Arial,sans-serif" font-size="46" font-weight="900" fill="#bc8cff">2048</text>
  <text x="20" y="82" font-family="Arial,sans-serif" font-size="12" fill="#484f58">Slide the tiles.</text>
  <text x="20" y="100" font-family="Arial,sans-serif" font-size="12" fill="#484f58">Reach 2048 to win.</text>
  <text x="20" y="118" font-family="Arial,sans-serif" font-size="11" fill="#30363d">← → ↑ ↓  ·  swipe on mobile</text>

  <!-- Play button -->
  <rect x="18" y="136" width="180" height="34" rx="6" fill="#21262d"/>
  <rect x="18" y="136" width="180" height="34" rx="6" fill="none" stroke="#bc8cff" stroke-width="1"/>
  <text x="108" y="158" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#bc8cff" text-anchor="middle" letter-spacing="2">▶  PLAY NOW</text>
</svg>
