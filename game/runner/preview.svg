<svg width="400" height="180" xmlns="http://www.w3.org/2000/svg">
  <!-- Card background -->
  <rect width="400" height="180" rx="10" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="399" height="179" rx="9.5" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Right side: game scene -->
  <!-- Sky -->
  <rect x="200" y="16" width="185" height="148" rx="6" fill="#0a0e15"/>

  <!-- Ground -->
  <rect x="200" y="134" width="185" height="2" fill="#21262d"/>

  <!-- BG code fragments -->
  <text x="210" y="40" font-family="Courier New,monospace" font-size="9" fill="#3fb950" opacity="0.12">import torch</text>
  <text x="270" y="65" font-family="Courier New,monospace" font-size="9" fill="#3fb950" opacity="0.08">nn.Linear(</text>
  <text x="215" y="90" font-family="Courier New,monospace" font-size="9" fill="#3fb950" opacity="0.10">loss.backward()</text>
  <text x="300" y="115" font-family="Courier New,monospace" font-size="9" fill="#3fb950" opacity="0.07">model.eval()</text>

  <!-- Obstacle: BUG -->
  <rect x="310" y="106" width="16" height="28" rx="2" fill="#f85149"/>
  <rect x="310" y="106" width="16" height="2" fill="#ff7b72"/>
  <text x="318" y="124" font-family="Arial,sans-serif" font-size="6" font-weight="700" fill="#0d1117" text-anchor="middle">BUG</text>

  <!-- Obstacle: 404 -->
  <rect x="350" y="116" width="22" height="18" rx="2" fill="#d29922"/>
  <rect x="350" y="116" width="22" height="2" fill="#e3b341"/>
  <text x="361" y="128" font-family="Arial,sans-serif" font-size="6" font-weight="700" fill="#0d1117" text-anchor="middle">404</text>

  <!-- Player: pixel robot -->
  <!-- head -->
  <rect x="240" y="90" width="20" height="14" rx="2" fill="#58a6ff"/>
  <!-- visor -->
  <rect x="244" y="93" width="12" height="6" rx="1" fill="#0d1117"/>
  <rect x="245" y="94" width="4" height="4" rx="0" fill="#39d353"/>
  <!-- torso -->
  <rect x="241" y="105" width="18" height="12" rx="1" fill="#388bfd"/>
  <!-- chest detail -->
  <rect x="244" y="107" width="4" height="4" fill="#58a6ff"/>
  <rect x="251" y="107" width="4" height="4" fill="#58a6ff"/>
  <!-- legs -->
  <rect x="243" y="118" width="6" height="8" rx="1" fill="#1f6feb"/>
  <rect x="251" y="118" width="6" height="6" rx="1" fill="#1f6feb"/>
  <!-- glow -->
  <rect x="239" y="88" width="22" height="40" rx="3" fill="none" stroke="#58a6ff" stroke-width="0.5" opacity="0.4"/>

  <!-- Left side: title + description -->
  <text x="20" y="46" font-family="Courier New,monospace" font-size="22" font-weight="700" fill="#58a6ff" letter-spacing="3">CODE</text>
  <text x="20" y="72" font-family="Courier New,monospace" font-size="22" font-weight="700" fill="#58a6ff" letter-spacing="3">RUNNER</text>
  <text x="20" y="100" font-family="Arial,sans-serif" font-size="12" fill="#484f58">Endless runner. Jump over</text>
  <text x="20" y="117" font-family="Arial,sans-serif" font-size="12" fill="#484f58">BUG · 404 · ERR · NaN</text>
  <text x="20" y="133" font-family="Arial,sans-serif" font-size="11" fill="#30363d">SPACE · ↑ · tap to jump</text>

  <!-- Play button -->
  <rect x="18" y="147" width="165" height="28" rx="6" fill="#21262d"/>
  <rect x="18" y="147" width="165" height="28" rx="6" fill="none" stroke="#58a6ff" stroke-width="1"/>
  <text x="100" y="166" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#58a6ff" text-anchor="middle" letter-spacing="2">▶  PLAY NOW</text>
</svg>
